<header class="site-header" role="banner">
  <div class="header-inner">
    <a class="brand" href="/reinforceDemo.github.io/">
      <img
        src="../../assets/images/logo/AOU Logo RGB White AW.svg"
        alt="Logo"
        class="brand-logo"
        data-logo-dark="../../assets/images/logo/AOU Logo RGB White AW.svg"
        data-logo-light="../../assets/images/logo/AOU Logo Navy Blue RGB AW.svg"
      />
    </a>

    <nav class="site-nav" aria-label="Primary navigation">
      <a class="nav-link nav-link-active home-headline" href="/reinforceDemo.github.io/">Courses</a>
      <a class="nav-link home-headline" href="/micro-credentials">Micro Credentials</a>
      <a class="nav-link home-headline" href="/instructors">Instructors</a>
      <a class="nav-link home-headline" href="/pages/pricing/">Plans</a>
    </nav>

    <div class="header-actions">
      <div class="tools-group" aria-label="Search and utility actions">
        <div class="search-wrap">
          <input class="search-input" type="text" placeholder="Search knowledge..." aria-label="Search knowledge" />
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </svg>
          </span>
        </div>

        <button class="icon-btn" type="button" aria-label="Change language" data-language-toggle>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M2 12h20"></path>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
          </svg>
        </button>

        <button class="icon-btn theme-toggle" type="button" data-theme-toggle aria-label="Switch to light mode" aria-pressed="false">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2"></path>
            <path d="M12 20v2"></path>
            <path d="m4.93 4.93 1.41 1.41"></path>
            <path d="m17.66 17.66 1.41 1.41"></path>
            <path d="M2 12h2"></path>
            <path d="M20 12h2"></path>
            <path d="m6.34 17.66-1.41 1.41"></path>
            <path d="m19.07 4.93-1.41 1.41"></path>
          </svg>
          <span class="theme-toggle-label" data-theme-toggle-label>Light</span>
        </button>

        <button class="icon-btn" type="button" aria-label="Account">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <circle cx="12" cy="10" r="3"></circle>
            <path d="M7 20.7a7 7 0 0 1 10 0"></path>
          </svg>
        </button>
      </div>

      <a class="join-btn home-headline" href="/enrollment/sign-up">Join Now</a>
    </div>
  </div>
</header>
